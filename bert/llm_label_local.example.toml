# Local config template for bert/02_llm_label_local.py

input = "data/bert/sample.csv"
output = "data/bert/labeled.csv"
report_path = "data/bert/labeling_report.json"
max_chars = 800
temperature = 0.0
timeout = 240
fix_json = true
save_raw = true
save_fixed_raw = true
save_every = 100
max_workers = 1
request_retries = 2
retry_backoff_sec = 3.0

[labeler]
provider = "ollama"
model = "gpt-oss:20b"

[fixer]
provider = "ollama"
model = "qwen3:8b"
